<!DOCTYPE html>
<html>
    <head>
       <title>Recipe Details</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="css/recipe.css"> 
    </head>
    <body>

        <div class="recipe-container">
        <div class="recipe-header d-flex justify-content-between align-items-center mb-3">
            <button onclick="history.back()" class="btn btn-outline-primary eb-garamond-regular">
                &larr; Back
            </button>
        </div>
            <div class="row">
                <div class="col-lg-6 col-md-12">
                    <img src="img/recipe-placeholder.jpg" alt="Recipe Image" id="recipe-photo" class="glow-border">
                </div>
        
                <div class="col-lg-6 col-md-12">
                    <h2 id="recipe-name" class="eb-garamond-bold">Recipe Name</h2>
                    <br>
                    <h5 class="eb-garamond-bold">Ingredients</h5>
                    <div id="ingredients-list" class="orange-dashed-box eb-garamond-regular">
                    </div>
                    <br>
                    <h5 class="eb-garamond-bold">Notes</h5>
                    <p id="recipe-tips" class="eb-garamond-regular"></p>
                    <br>
                    <a id="recipe-link" href="#" target="_blank" class="btn btn-primary-orange eb-garamond-regular">Original Recipe</a>
             </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
        <script src="js/recipe.js"></script>
    </body>
</html>
